name: DinoRand feature request
description: Propose a player-focused outcome
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Player problem
      description: What player need or limitation should be addressed?
    validations: {required: true}
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe the result for players, not an implementation.
    validations: {required: true}
  - type: dropdown
    id: game
    attributes:
      label: Game or scope
      options: ["Dino Crisis 1", "Dino Crisis 2", "Both games", "Release/tooling"]
    validations: {required: true}
  - type: textarea
    id: safety
    attributes:
      label: Safety and reversibility
      description: How should backups, restore behavior, unsupported editions, and risky options be handled?
    validations: {required: true}
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations: {required: true}
  - type: markdown
    attributes:
      value: Do not attach game files, executables, copyrighted-byte dumps, credentials, or private data.
