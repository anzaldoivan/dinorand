name: ci

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; a new push cancels the previous run for the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # least privilege — CI only reads the repo

jobs:
  build-test-coverage:
    name: build-test-coverage # stable name — this is a required status check (scripts/setup-rulesets.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Release hardening contracts
        run: >-
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=scripts python3 -m unittest
          scripts/test_release_validate.py scripts/test_check_docs.py
          scripts/test_release_notices.py scripts/test_package_release.py

      - name: Public documentation contract
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/check_docs.py --check

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 8.0.423

      # --locked-mode: projects with a committed packages.lock.json (DinoRand.ApClient — the AP
      # protocol dependency) fail the build if the resolved package graph drifts from the lockfile.
      - name: Restore
        run: dotnet restore DinoRand.sln --locked-mode

      - name: Build
        run: dotnet build -c Release --no-restore

      # Reuses the project's coverage script (dotnet tool restore → dotnet test --collect → ReportGenerator).
      # Integration tests with no game install fall back to DMCA-safe synthetic mock rooms, so they run here.
      - name: Test + coverage
        run: bash scripts/coverage.sh

      - name: Coverage gate
        run: |
          # Floor set just below today's ~70% line coverage so the build is green now. RATCHET IT UPWARD as
          # coverage grows — new features earn coverage via this floor + PR review, never by lowering it.
          THRESHOLD=70
          PCT=$(python3 -c "import xml.etree.ElementTree as ET; \
            print(round(float(ET.parse('coverage-report/Cobertura.xml').getroot().get('line-rate')) * 100, 2))")
          echo "Overall line coverage: ${PCT}%  (floor: ${THRESHOLD}%)"
          echo "PCT=$PCT" >> "$GITHUB_ENV"   # reused by the badge step below
          awk -v p="$PCT" -v t="$THRESHOLD" 'BEGIN { exit (p + 0 < t + 0) ? 1 : 0 }' || {
            echo "::error::Line coverage ${PCT}% is below the ${THRESHOLD}% floor"; exit 1; }

      # Publishes the live PCT (from the gate step) to a public gist that the README shields.io badge reads.
      # main-push only: never republish from PRs or feature branches. Skips silently if the gate step failed.
      - name: Update coverage badge gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: b1a330aadd5e6deb20cf6ec18c738b6a
          filename: dinorand-coverage.json
          label: coverage
          message: ${{ env.PCT }}%
          valColorRange: ${{ env.PCT }}
          maxColorRange: 90
          minColorRange: 50

      - name: Coverage summary → job summary
        if: always()
        run: |
          if [ -f coverage-report/Summary.txt ]; then
            { echo '```'; cat coverage-report/Summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage-report/
