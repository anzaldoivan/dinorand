name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Check out the pushed tag with full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch the checked main branch
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
      - name: Validate existing tag, version, ancestry, and curated notes
        id: release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python3 scripts/release_validate.py
          --tag "$RELEASE_TAG" --notes-output NOTES.md --github-output "$GITHUB_OUTPUT"
      - name: Preserve validated release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: NOTES.md
          if-no-files-found: error

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the validated tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use the pinned release SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.423
      - name: Locked solution restore
        run: dotnet restore DinoRand.sln --locked-mode
      - name: Release build
        run: dotnet build DinoRand.sln -c Release --no-restore
      - name: Full test suite
        run: dotnet test DinoRand.sln -c Release --no-build --no-restore
      - name: Build and verify all release assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: bash scripts/build-release-assets.sh "$VERSION"
      - name: Upload the complete release asset set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/release-assets/*
          if-no-files-found: error

  attest:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets
      - name: Attest the complete asset set
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*

  publish:
    needs: [validate, build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets
      - name: Download validated notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Create, verify, and publish the draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          expected=(
            "dinorand-v${VERSION}-win-x64.zip"
            "dinorand-v${VERSION}-linux-x64.zip"
            "dinorand-v${VERSION}-osx-arm64.zip"
            "dino_crisis_1.apworld"
            "dino_crisis_2.apworld"
            "SHA256SUMS"
          )
          for name in "${expected[@]}"; do test -f "release-assets/$name"; done
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq "${#expected[@]}"
          (cd release-assets && sha256sum -c SHA256SUMS)
          flags=()
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          gh release create "$RELEASE_TAG" --verify-tag --draft \
            --title "DinoRand $RELEASE_TAG" --notes-file release-metadata/NOTES.md "${flags[@]}"
          paths=()
          for name in "${expected[@]}"; do paths+=("release-assets/$name"); done
          gh release upload "$RELEASE_TAG" "${paths[@]}"
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > draft-release.json
          python3 - "$VERSION" draft-release.json <<'PY'
          import json, sys
          version, path = sys.argv[1:]
          release = json.load(open(path, encoding="utf-8"))
          expected = {
              f"dinorand-v{version}-win-x64.zip",
              f"dinorand-v{version}-linux-x64.zip",
              f"dinorand-v{version}-osx-arm64.zip",
              "dino_crisis_1.apworld", "dino_crisis_2.apworld", "SHA256SUMS",
          }
          actual = {asset["name"] for asset in release["assets"]}
          if not release["draft"] or actual != expected:
              raise SystemExit(f"draft completeness check failed: draft={release['draft']} assets={sorted(actual)}")
          PY
          gh release edit "$RELEASE_TAG" --draft=false
