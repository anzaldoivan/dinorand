name: apworld-checks

# Enforceable backstop for the Archipelago integration (AP-independent tier): client pre-commit
# hooks can be skipped with --no-verify, this cannot. Verifies the derived DC1 logic contract is in
# sync with the authored data/dc1 sources and that the apworld's generation logic wires up.
#
# The `apworld` job is the AP-INDEPENDENT tier (no AP checkout). The `apworld-ap-integration` job runs the
# real AP-side WorldTestBase tests against a pinned Archipelago release — end-to-end validation of the
# shipped world (fill, reachability, beatability, gate dependencies), the AP way. Together they are the
# enforceable backstop; client pre-commit hooks can be --no-verify'd, these cannot.
# Make both REQUIRED checks in branch protection for `main` alongside no-copyrighted-files.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  apworld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: logic contracts in sync with authored data (non-mutating, all games)
        run: python3 scripts/gen_ap_logic.py --check
      - name: DC1 apworld generation wiring self-check
        run: python3 apworld/dino_crisis_1/selfcheck.py
      - name: DC2 apworld generation wiring self-check
        run: python3 apworld/dino_crisis_2/selfcheck.py
      # docs/ is publish-held-back (absent from this checkout), so this degrades to the logic
      # invariants — it still fails the build if the distilled model stops being solvable.
      - name: reachability docs generator invariants (DOCS-AUDIENCE-PLAN.md §5a)
        run: python3 scripts/gen_reachability.py --check
      - name: data-reference docs generator (DOCS-AUDIENCE-PLAN.md §6.4)
        run: python3 scripts/gen_data_reference.py --check

  # AP-side end-to-end: generate/fill the actual shipped world under a real Archipelago, running the
  # WorldTestBase suite (test_fill, test_all_state_can_reach_everything, …) plus the DinoRand gate/beatability
  # tests. Catches AP-model drift the star re-simulation can't — the true OoTR/AP validation.
  apworld-ap-integration:
    runs-on: ubuntu-latest
    env:
      # Pinned Archipelago release. Must be >= apworld/*/archipelago.json minimum_ap_version (0.6.0).
      # Bump deliberately (a new AP release can change WorldTestBase); tags: github.com/ArchipelagoMW/Archipelago.
      # 0.6.7 = the latest AP release (no 0.6.8 tag exists as of 2026-07-19 — the prior pin was a
      # forward-reference that failed checkout); the runtime client was live-verified against a
      # local 0.6.7 server + this apworld on 2026-07-19 (AP-CLIENT-PLAN.md Deviations).
      AP_REF: "0.6.7"
    steps:
      - name: Checkout DinoRand
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: dinorand
      - name: Checkout Archipelago (pinned)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ArchipelagoMW/Archipelago
          ref: ${{ env.AP_REF }}
          path: Archipelago
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install Archipelago dependencies
        working-directory: Archipelago
        run: python ModuleUpdate.py --yes
      - name: Install Archipelago test dependencies
        working-directory: Archipelago
        run: python -m pip install -r ci-requirements.txt
      - name: Drop both worlds into the Archipelago checkout
        run: |
          cp -r dinorand/apworld/dino_crisis_1 Archipelago/worlds/dino_crisis_1
          cp -r dinorand/apworld/dino_crisis_2 Archipelago/worlds/dino_crisis_2
      - name: Run the DC1 world tests (fill / reachability / beatability / gate dependencies / slot_data)
        working-directory: Archipelago
        run: python -m pytest worlds/dino_crisis_1/test -q
      - name: Run the DC2 world tests (closes the DC2-absent CI divergence, AP-CLIENT-INVESTIGATION §1)
        working-directory: Archipelago
        run: python -m pytest worlds/dino_crisis_2/test -q
