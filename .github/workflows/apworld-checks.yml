name: apworld-checks

# Enforceable backstop for the Archipelago integration (AP-independent tier): client pre-commit
# hooks can be skipped with --no-verify, this cannot. Verifies the derived DC1 logic contract is in
# sync with the authored data/dc1 sources and that the apworld's generation logic wires up.
#
# NOTE: the AP-side WorldTestBase tests (apworld/dino_crisis_1/test/) are NOT run here — they need
# a full Archipelago checkout (Python <=3.13 + deps). Run them manually per apworld/dino_crisis_1/README.md.
# Make this a REQUIRED check in branch protection for `main` alongside no-copyrighted-files.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  apworld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: logic contracts in sync with authored data (non-mutating, all games)
        run: python3 scripts/gen_ap_logic.py --check
      - name: DC1 apworld generation wiring self-check
        run: python3 apworld/dino_crisis_1/selfcheck.py
      - name: DC2 apworld generation wiring self-check
        run: python3 apworld/dino_crisis_2/selfcheck.py
